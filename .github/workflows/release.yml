name: release

# De-facto Vyges multi-arch build: native per-arch builds + DIGEST-based manifest
# merge -> clean tags (only :sha-<short> / :<version> / :latest, each a multi-arch
# manifest; NO intermediate per-arch tags, NO attestation "unknown" entries).
# Free native runners (amd64 + arm64) on a public repo. Verified by multiarch-check.

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 0.30.9)"
        required: true

permissions:
  contents: write
  packages: write

env:
  IMG: ghcr.io/vyges-tools/vyges-klayout

jobs:
  # ---- per-arch: bundle + tarball, then push the image BY DIGEST (no tag) ----
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            arch: x86_64
            docker_arch: amd64
          - runner: ubuntu-24.04-arm
            arch: aarch64
            docker_arch: arm64
    runs-on: ${{ matrix.runner }}
    name: build-${{ matrix.arch }}
    steps:
      - uses: actions/checkout@v4

      - name: Read pin from upstream.yaml
        id: pin
        run: |
          COMMIT=$(grep -E '^[[:space:]]*commit:' upstream.yaml | head -1 \
            | sed -E 's/.*commit:[[:space:]]*//; s/[[:space:]]*#.*//; s/"//g')
          echo "commit=$COMMIT" >> "$GITHUB_OUTPUT"
          echo "short=${COMMIT:0:12}" >> "$GITHUB_OUTPUT"

      - name: Install Qt-free build deps
        run: |
          sudo apt-get update -qq
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y -qq \
            build-essential python3 python3-dev python3-pip python3-tomli \
            zlib1g-dev libexpat1-dev libpng-dev libcurl4-openssl-dev

      - name: Clone KLayout at pinned commit
        run: |
          git clone https://github.com/KLayout/klayout.git /tmp/klayout
          git -C /tmp/klayout checkout "${{ steps.pin.outputs.commit }}"

      - name: Build bundle + tarball (arch from uname -m)
        env:
          KL_COMMIT: ${{ steps.pin.outputs.commit }}
          VERSION: ${{ inputs.version }}
          OUT_DIR: ${{ github.workspace }}/dist
          KL_TREE: /tmp/klayout
        run: bash scripts/build-bundle.sh

      - name: Smoke (tarball bundle)
        run: bash scripts/smoke.sh "dist/vyges-klayout-${{ inputs.version }}-g${{ steps.pin.outputs.short }}"

      - name: Upload tarball artifact
        uses: actions/upload-artifact@v4
        with:
          name: tarball-${{ matrix.arch }}
          path: dist/*.tar.gz

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build + push image BY DIGEST (native ${{ matrix.docker_arch }})
        env:
          VERSION: ${{ inputs.version }}
          SHORT: ${{ steps.pin.outputs.short }}
          DA: ${{ matrix.docker_arch }}
        run: |
          docker buildx build -f Dockerfile.runtime \
            --build-arg BUNDLE_DIR="vyges-klayout-${VERSION}-g${SHORT}" \
            --build-arg VERSION="${VERSION}" \
            --platform "linux/${DA}" --provenance=false \
            --output "type=image,name=${IMG},push-by-digest=true,name-canonical=true,push=true" \
            --metadata-file /tmp/meta.json dist
          DIGEST=$(jq -r '."containerimage.digest"' /tmp/meta.json)
          echo "pushed $IMG@$DIGEST"
          mkdir -p /tmp/digests && touch "/tmp/digests/${DIGEST#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digest-${{ matrix.arch }}
          path: /tmp/digests/*
          if-no-files-found: error

  # ---- combine per-arch DIGESTS into clean multi-arch manifest tags + publish ----
  publish:
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Read pin (short)
        id: pin
        run: |
          COMMIT=$(grep -E '^[[:space:]]*commit:' upstream.yaml | head -1 \
            | sed -E 's/.*commit:[[:space:]]*//; s/[[:space:]]*#.*//; s/"//g')
          echo "commit=$COMMIT" >> "$GITHUB_OUTPUT"
          echo "short=${COMMIT:0:12}" >> "$GITHUB_OUTPUT"

      - name: Collect both tarballs
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: tarball-*
          merge-multiple: true

      - name: Collect image digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digest-*
          merge-multiple: true

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create multi-arch manifests from digests
        env:
          VERSION: ${{ inputs.version }}
          SHORT: ${{ steps.pin.outputs.short }}
        run: |
          SRCS=$(for f in /tmp/digests/*; do echo -n "${IMG}@sha256:$(basename "$f") "; done)
          for TAG in "sha-${SHORT}" "${VERSION}" latest; do
            docker buildx imagetools create -t "${IMG}:${TAG}" $SRCS
          done
          docker buildx imagetools inspect "${IMG}:${VERSION}"

      - name: Publish GitHub Release (both-arch tarballs)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          name: vyges-klayout ${{ inputs.version }}
          body: |
            Headless (Qt-free) KLayout ${{ inputs.version }} (pinned upstream commit ${{ steps.pin.outputs.commit }}).
            **Multi-arch: linux/amd64 + linux/arm64** (native builds, digest-based manifest).
            - Tarballs: `…-linux-x86_64.tar.gz` and `…-linux-aarch64.tar.gz` — `source env.sh` then `import klayout.db`.
            - Image: `ghcr.io/vyges-tools/vyges-klayout:${{ inputs.version }}` (multi-arch manifest).
            GPL-3.0-or-later (see LICENSE.KLayout + SOURCE_OFFER in the bundle).
          files: dist/*.tar.gz
