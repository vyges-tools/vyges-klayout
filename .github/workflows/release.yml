name: release

# Build the headless (Qt-free) KLayout bundle at the pinned commit and publish BOTH
# artifacts: a relocatable tar.gz (GitHub Release) and a slim container (ghcr.io).
# Free on a public repo. Steps mirror the validated manual build (ubuntu:24.04).

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 0.30.9)"
        required: true

permissions:
  contents: write   # create the GitHub Release
  packages: write   # push to ghcr.io

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Read pin from upstream.yaml
        id: pin
        run: |
          COMMIT=$(grep -E '^[[:space:]]*commit:' upstream.yaml | head -1 \
            | sed -E 's/.*commit:[[:space:]]*//; s/[[:space:]]*#.*//; s/"//g')
          echo "commit=$COMMIT" >> "$GITHUB_OUTPUT"
          echo "short=${COMMIT:0:12}" >> "$GITHUB_OUTPUT"
          echo "Pinned commit: $COMMIT"

      - name: Install Qt-free build deps
        run: |
          sudo apt-get update -qq
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y -qq \
            build-essential python3 python3-dev python3-pip \
            zlib1g-dev libexpat1-dev libpng-dev libcurl4-openssl-dev

      - name: Clone KLayout at pinned commit
        run: |
          git clone https://github.com/KLayout/klayout.git /tmp/klayout
          git -C /tmp/klayout checkout "${{ steps.pin.outputs.commit }}"

      - name: Build bundle + tarball
        env:
          KL_COMMIT: ${{ steps.pin.outputs.commit }}
          VERSION: ${{ inputs.version }}
          OUT_DIR: ${{ github.workspace }}/dist
          KL_TREE: /tmp/klayout
        run: bash scripts/build-bundle.sh

      - name: Smoke (tarball bundle)
        run: bash scripts/smoke.sh "dist/vyges-klayout-${{ inputs.version }}-g${{ steps.pin.outputs.short }}"

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build, smoke + push container
        env:
          VERSION: ${{ inputs.version }}
          SHORT: ${{ steps.pin.outputs.short }}
        run: |
          IMG=ghcr.io/vyges-tools/vyges-klayout
          docker build -f Dockerfile.runtime \
            --build-arg BUNDLE_DIR="vyges-klayout-${VERSION}-g${SHORT}" \
            --build-arg VERSION="${VERSION}" \
            -t "$IMG:sha-${SHORT}" -t "$IMG:${VERSION}" -t "$IMG:latest" dist
          bash scripts/smoke.sh "$IMG:${VERSION}"
          docker push "$IMG:sha-${SHORT}"
          docker push "$IMG:${VERSION}"
          docker push "$IMG:latest"

      - name: Publish GitHub Release (tarball)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          name: vyges-klayout ${{ inputs.version }}
          body: |
            Headless (Qt-free) KLayout ${{ inputs.version }} (pinned upstream commit ${{ steps.pin.outputs.commit }}).
            - Tarball: relocatable `pymod/` — `source env.sh` then `import klayout.db`.
            - Image: `ghcr.io/vyges-tools/vyges-klayout:${{ inputs.version }}`.
            GPL-3.0-or-later (see LICENSE.KLayout + SOURCE_OFFER in the bundle).
          files: dist/*.tar.gz
